name: CI
'on':
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
permissions:
  contents: read
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
      - name: gofmt
        run: >
          unformatted=$(gofmt -l
          .)                                                                                                                                                  

          if [ -n "$unformatted" ];
          then                                                                                                                                           
            echo "::error::The following files are not gofmt-clean:"
            echo "$unformatted"                                               
            echo ""
            echo "Run 'gofmt -w .' to fix."                                                                                                                                          
            gofmt -d .                 
            exit 1                                                                                                                                                                   
          fi                                                                                                                                                                       
                                                                                                                                                                                     
      - name: go mod tidy (check for drift)
        run: >
          diff=$(go mod tidy -diff 2>&1 ||
          true)                                                                                                                                   

          if [ -n "$diff" ]; then      
            echo "::error::go.mod/go.sum are out of date. Run 'go mod tidy' and commit."
            echo "$diff"               
            exit 1                                                                                                                                                                   
          fi
                                                                                                                                                                                     
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
  vuln:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
      - name: govulncheck
        run: >
          go install golang.org/x/vuln/cmd/govulncheck@latest

          govulncheck
          ./...                                                                                                                                                          
                                                                                                                                                                                   
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version:
          - '1.22'
          - '1.23'
          - '1.24'
    steps:
      - uses: actions/checkout@v6
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '${{ matrix.go-version }}'
      - name: Vet
        run: go vet ./...
      - name: Test
        run: >-
          go test -race -count=1 -coverprofile=coverage.out -covermode=atomic
          ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1
      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.24'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.out
          flags: unittests
          fail_ci_if_error: false
