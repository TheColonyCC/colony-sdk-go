version: "2"

linters:
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (io.ReadCloser).Close
        - (*net/http.ResponseWriter).Write
        - (net/http.ResponseWriter).Write
        - (*encoding/json.Encoder).Encode
        - (*encoding/json.Decoder).Decode
        - encoding/json.Unmarshal

  exclusions:
    rules:
      # Relax errcheck in test and benchmark files — unchecked errors are
      # acceptable when the test will fail on other assertions anyway.
      - path: _test\.go
        linters:
          - errcheck
